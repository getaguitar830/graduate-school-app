<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>可考大学院检索</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1e293b;
      --muted: #64748b;
      --line: #d7dde8;
      --panel: #ffffff;
      --soft: #f5f7fb;
      --navy: #1f2a44;
      --blue: #2563eb;
      --green: #047857;
      --amber: #b45309;
      --rose: #be123c;
      --shadow: 0 14px 34px rgba(30, 41, 59, 0.09);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #eef3f8;
      color: var(--ink);
    }
    button, input, select { font: inherit; }
    .app { min-height: 100vh; display: grid; grid-template-columns: 330px 1fr; }
    aside {
      position: sticky; top: 0; height: 100vh; overflow: auto;
      background: var(--navy); color: white; padding: 26px 22px;
      display: flex; flex-direction: column; gap: 18px;
    }
    h1 { margin: 0; font-size: 25px; line-height: 1.22; letter-spacing: 0; }
    .sub { margin: 9px 0 0; color: #cbd5e1; font-size: 13px; line-height: 1.65; }
    .control { display: grid; gap: 7px; }
    label, .filter-title { font-size: 12px; font-weight: 700; color: #dbe4ef; }
    input, select {
      width: 100%; height: 42px; border: 1px solid rgba(255,255,255,.22);
      border-radius: 8px; background: rgba(255,255,255,.09); color: white;
      padding: 0 11px; outline: none;
    }
    input::placeholder { color: #aeb9c8; }
    select option { color: var(--ink); }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      border: 1px solid rgba(255,255,255,.22); color: white; background: transparent;
      border-radius: 999px; min-height: 32px; padding: 5px 11px; cursor: pointer;
    }
    .chip.active, .chip:hover { background: white; color: var(--navy); }
    .stats { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; margin-top: auto; }
    .stat { border: 1px solid rgba(255,255,255,.14); border-radius: 8px; background: rgba(255,255,255,.08); padding: 12px; }
    .stat strong { display: block; font-size: 23px; }
    .stat span { color: #cbd5e1; font-size: 12px; }
    main { padding: 28px; }
    .topbar { display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; margin-bottom: 18px; }
    h2 { margin: 0; font-size: 20px; letter-spacing: 0; }
    .hint { margin: 6px 0 0; color: var(--muted); font-size: 13px; line-height: 1.55; }
    .actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
    .ghost {
      height: 38px; border: 1px solid var(--line); border-radius: 8px; background: white;
      color: var(--ink); padding: 0 12px; cursor: pointer;
    }
    .summary-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; margin-bottom: 18px; }
    .summary {
      background: white; border: 1px solid var(--line); border-radius: 8px; padding: 14px 15px;
      box-shadow: 0 8px 24px rgba(30,41,59,.05);
    }
    .summary strong { display: block; font-size: 22px; }
    .summary span { color: var(--muted); font-size: 12px; }
    .region-strip { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
    .region-pill {
      border: 1px solid var(--line); background: white; border-radius: 999px; padding: 7px 11px;
      font-size: 13px; color: var(--muted);
    }
    .region-pill b { color: var(--ink); margin-left: 4px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(335px, 1fr)); gap: 14px; }
    .card {
      background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
      box-shadow: var(--shadow); overflow: hidden; display: grid; grid-template-rows: auto 1fr auto;
    }
    .card-head { padding: 16px 17px 12px; border-bottom: 1px solid var(--line); display: grid; gap: 10px; }
    .title-row { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
    h3 { margin: 0; font-size: 18px; line-height: 1.35; letter-spacing: 0; }
    .badge { flex: 0 0 auto; border-radius: 999px; background: #e8f1ff; color: #1d4ed8; padding: 4px 9px; font-size: 12px; font-weight: 700; white-space: nowrap; }
    .tags { display: flex; flex-wrap: wrap; gap: 7px; }
    .tag { border-radius: 999px; background: var(--soft); color: var(--muted); padding: 4px 8px; font-size: 12px; }
    .tag.green { background: #e8f7ef; color: var(--green); }
    .tag.amber { background: #fff4e5; color: var(--amber); }
    .card-body { padding: 15px 17px; display: grid; gap: 12px; }
    .deadline {
      display: grid; grid-template-columns: 1fr 1fr; gap: 9px;
    }
    .mini { background: var(--soft); border-radius: 8px; padding: 10px; min-width: 0; }
    .mini span { display: block; color: var(--muted); font-size: 12px; margin-bottom: 5px; }
    .mini strong { display: block; font-size: 14px; line-height: 1.35; overflow-wrap: anywhere; }
    .section { display: grid; gap: 5px; }
    .section span { color: var(--muted); font-size: 12px; font-weight: 700; }
    .section p { margin: 0; font-size: 13px; line-height: 1.55; color: #334155; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .card-foot { border-top: 1px solid var(--line); padding: 12px 17px; display: flex; justify-content: space-between; gap: 10px; align-items: center; }
    .updated { color: var(--muted); font-size: 12px; }
    .link { color: var(--blue); text-decoration: none; font-weight: 700; font-size: 13px; }
    .empty { background: white; border: 1px dashed #a8b3c3; border-radius: 8px; padding: 32px; text-align: center; color: var(--muted); grid-column: 1 / -1; }
    .gate {
      position: fixed; inset: 0; z-index: 10; background: #eef3f8;
      display: grid; place-items: center; padding: 22px;
    }
    .gate.hidden { display: none; }
    .gate-box {
      width: min(430px, 100%); background: white; border: 1px solid var(--line);
      border-radius: 8px; box-shadow: var(--shadow); padding: 24px;
      display: grid; gap: 14px;
    }
    .gate-box h2 { font-size: 22px; }
    .gate-box p { margin: 0; color: var(--muted); line-height: 1.6; font-size: 14px; }
    .gate-box input {
      color: var(--ink); background: white; border: 1px solid var(--line);
    }
    .primary {
      height: 42px; border: 0; border-radius: 8px; background: var(--navy);
      color: white; cursor: pointer; font-weight: 700;
    }
    .error { color: var(--rose); min-height: 18px; font-size: 13px; }
    mark { background: #fde68a; color: inherit; padding: 0 2px; border-radius: 3px; }
    @media (max-width: 900px) {
      .app { display: block; }
      aside { position: relative; height: auto; }
      main { padding: 20px 14px; }
      .topbar { display: grid; }
      .actions { justify-content: flex-start; }
      .summary-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <section class="gate" id="gate" aria-label="访问验证">
    <form class="gate-box" id="gateForm">
      <div>
        <h2>可考大学院检索</h2>
        <p>请输入内部访问密码。通过后会在本设备记住访问状态。</p>
      </div>
      <input id="accessCode" type="password" autocomplete="current-password" placeholder="访问密码">
      <button class="primary" type="submit">进入检索</button>
      <div class="error" id="gateError"></div>
    </form>
  </section>
  <div class="app">
    <aside>
      <div>
        <h1>可考大学院检索</h1>
        <p class="sub">面向内部学员的大学院信息库。可输入学校、研究科、考试方式，也可输入“2026年7月”查看当月可出愿项目。</p>
      </div>
      <div class="control">
        <label for="search">关键词 / 出愿月份</label>
        <input id="search" type="search" placeholder="例：2026年7月 / 大阪 / TOEIC">
      </div>
      <div class="control">
        <label for="schoolSearch">学校名字搜索</label>
        <input id="schoolSearch" type="search" placeholder="例：早稻田大学 / 東洋大学">
      </div>
      <div class="control">
        <label for="direction">方向</label>
        <select id="direction"><option value="">全部方向</option></select>
      </div>
      <div class="control">
        <label for="japaneseRequirement">日语要求</label>
        <select id="japaneseRequirement">
          <option value="">全部日语要求</option>
          <option value="no-jlpt">只看不需要日语成绩/JLPT要求</option>
        </select>
      </div>
      <div class="control">
        <label for="region">地域</label>
        <select id="region"><option value="">全部地域</option></select>
      </div>
      <div class="control">
        <label for="prefecture">都道府县</label>
        <select id="prefecture"><option value="">全部都道府县</option></select>
      </div>
      <div class="control">
        <label for="admissionMonth">入学月份</label>
        <select id="admissionMonth"><option value="">全部入学月份</option></select>
      </div>
      <div class="control">
        <label for="applicationMonth">出愿月份</label>
        <select id="applicationMonth"><option value="">全部出愿月份</option></select>
      </div>
      <div class="control">
        <label for="category">学校类别</label>
        <select id="category"><option value="">全部类别</option></select>
      </div>
      <div class="control">
        <label for="examType">入试区分</label>
        <select id="examType"><option value="">全部区分</option></select>
      </div>
      <div class="filter-title">快捷搜索</div>
      <div class="chips" id="quickChips"></div>
      <div class="stats">
        <div class="stat"><strong id="sideCount">0</strong><span>当前结果</span></div>
        <div class="stat"><strong>36</strong><span>学校数</span></div>
      </div>
    </aside>
    <main>
      <section class="topbar">
        <div>
          <h2>大学院项目列表</h2>
          <p class="hint">出愿月份按“出愿开始时间/截止时间”匹配；入学月份来自原表“入学时间”。方向来自表格里的性别/表象/媒介方向列。</p>
        </div>
        <div class="actions">
          <button class="ghost" id="resetButton">重置筛选</button>
          <button class="ghost" id="exportButton">导出当前结果 CSV</button>
        </div>
      </section>
      <section class="summary-grid">
        <div class="summary"><strong id="resultCount">0</strong><span>匹配项目</span></div>
        <div class="summary"><strong id="schoolCount">0</strong><span>匹配学校</span></div>
        <div class="summary"><strong id="monthCount">0</strong><span>出愿月份覆盖</span></div>
        <div class="summary"><strong>149</strong><span>总记录</span></div>
      </section>
      <section class="region-strip" id="regionStrip" aria-label="地域分布"></section>
      <section class="grid" id="results"></section>
    </main>
  </div>

    }
    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }
    function escapeAttr(value) { return escapeHtml(value).replace(/`/g, '&#96;'); }
    function snippet(value) { return value ? escapeHtml(value) : '<span style="color:#94a3b8">未记载</span>'; }
    function languageSummary(record) {
      const japanese = String(record.japanese || '');
      const english = String(record.english || '');
      const parts = [];
      const looksLikeApplicationDocs = /研究計画|研究计划|受験論文|受验论文|卒業論文|毕业论文|志望理由|提出書類|様式/.test(japanese);
      if (/N1|１級|1級/i.test(japanese)) {
        parts.push('日语：要N1证书');
      } else if (/N2|２級|2級/i.test(japanese)) {
        parts.push('日语：要N2证书');
      } else if (record.japaneseTag || /特定のJLPT要求なし|JLPT.*なし|JLPT.*不要/.test(japanese)) {
        parts.push('日语：特定JLPT要求なし');
      } else if (looksLikeApplicationDocs) {
        parts.push('日语：未记载');
      } else if (japanese) {
        parts.push('日语：要确认募集要项');
      } else {
        parts.push('日语：未记载');
      }
      if (/TOEIC|TOEFL|IELTS|英語|英语|外部/i.test(english)) {
        parts.push('英语：要提交或参加英语审查');
      }
      return parts.join(' / ');
    }
    function searchable(record) {
      return normalize(Object.entries(record).filter(([key]) => !['notes'].includes(key)).map(([, value]) => Array.isArray(value) ? value.join(' ') : value).join(' '));
    }
    function schoolSearchable(record) {
      return normalize([record.school, ...(record.schoolAliases || [])].join(' '));
    }
    function matches(record) {
      const query = normalize(state.search);
      const queryMonth = monthFromSearch(state.search);
      if (query) {
        const textHit = searchable(record).includes(query);
        const monthHit = queryMonth && (record.applicationMonths.includes(queryMonth) || record.eventMonths.includes(queryMonth));
        if (!textHit && !monthHit) return false;
      }
      const schoolQuery = normalize(state.schoolSearch);
      if (schoolQuery && !schoolSearchable(record).includes(schoolQuery)) return false;
      if (state.region && record.region !== state.region) return false;
      if (state.prefecture && record.prefecture !== state.prefecture) return false;
      if (state.admissionMonth && record.admissionMonth !== state.admissionMonth) return false;
      if (state.applicationMonth && !record.applicationMonths.includes(state.applicationMonth)) return false;
      if (state.category && record.category !== state.category) return false;
      if (state.examType && record.examType !== state.examType) return false;
      if (state.direction && !(record.directionTags || []).includes(state.direction)) return false;
      if (state.japaneseRequirement === 'no-jlpt' && !record.japaneseTag) return false;
      return true;
    }
    function highlight(text) {
      const raw = String(text || '');
      const q = state.search.trim();
      if (!q || monthFromSearch(q)) return escapeHtml(raw);
      const safe = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return escapeHtml(raw).replace(new RegExp(safe, 'ig'), m => `<mark>${m}</mark>`);
    }
    function card(record) {
      const appMonths = record.applicationMonths.map(monthLabel).join('、') || '未整理';
      const title = `${record.school}｜${record.graduateSchool || '研究科未记载'}`;
      const directionText = record.direction || '未标注';
      return `<article class="card">
        <div class="card-head">
          <div class="title-row">
            <h3>${highlight(title)}</h3>
            <span class="badge">${escapeHtml(record.category || '未分类')}</span>
          </div>
          <div class="tags">
            <span class="tag green">${escapeHtml(record.region)} / ${escapeHtml(record.prefecture)}</span>
            <span class="tag">${escapeHtml(record.admissionSeason || '季节未记载')}入试</span>
            <span class="tag amber">入学：${escapeHtml(record.admissionMonth || '未记载')}</span>
            <span class="tag">方向：${escapeHtml(directionText)}</span>
            ${record.japaneseTag ? `<span class="tag green">${escapeHtml(record.japaneseTag)}</span>` : ''}
          </div>
        </div>
        <div class="card-body">
          <div class="deadline">
            <div class="mini"><span>出愿开始</span><strong>${snippet(record.applicationStart)}</strong></div>
            <div class="mini"><span>出愿截止</span><strong>${snippet(record.applicationEnd)}</strong></div>
          </div>
          <div class="deadline">
            <div class="mini"><span>出愿月份</span><strong>${escapeHtml(appMonths)}</strong></div>
            <div class="mini"><span>入试区分</span><strong>${snippet(record.examType)}</strong></div>
          </div>
          <div class="section"><span>専攻・コース</span><p>${highlight(record.course || record.detailType || '未记载')}</p></div>
          <div class="section"><span>考试形式</span><p>${highlight(record.examFormat || '未记载')}${record.online ? ' / 在线：' + escapeHtml(record.online) : ''}</p></div>
          <div class="section"><span>语言要求</span><p>${escapeHtml(languageSummary(record))}</p></div>
          <div class="section"><span>考试日期</span><p>${highlight([record.writtenExam, record.interview].filter(Boolean).join(' / ') || '未记载')}</p></div>
          <div class="section"><span>出结果日期</span><p>${highlight([record.documentResult, record.writtenResult, record.finalResult].filter(Boolean).join(' / ') || '未记载')}</p></div>
          ${record.recommendedProfessor ? `<div class="section"><span>推荐教授</span><p>${highlight(record.recommendedProfessor)}</p></div>` : ''}
          <div class="section"><span>备注</span><p>${highlight(record.notes || record.capacity || '未记载')}</p></div>
        </div>
        <div class="card-foot">
          <span class="updated">更新：${escapeHtml(record.updatedAt || '未记载')}</span>
          ${record.url ? `<a class="link" href="${escapeAttr(record.url)}" target="_blank" rel="noreferrer">出愿要项</a>` : '<span class="updated">暂无链接</span>'}
        </div>
      </article>`;
    }
    function render() {
      const filtered = records.filter(matches);
      $('sideCount').textContent = filtered.length;
      $('resultCount').textContent = filtered.length;
      $('schoolCount').textContent = uniq(filtered.map(r => r.school)).length;
      $('monthCount').textContent = uniq(filtered.flatMap(r => r.applicationMonths)).length;
      const byRegion = Object.entries(filtered.reduce((acc, r) => { acc[r.region] = (acc[r.region] || 0) + 1; return acc; }, {})).sort((a,b) => b[1]-a[1]);
      $('regionStrip').innerHTML = byRegion.map(([name, count]) => `<button class="region-pill" data-region="${escapeAttr(name)}">${escapeHtml(name)} <b>${count}</b></button>`).join('');
      $('regionStrip').querySelectorAll('[data-region]').forEach(btn => btn.addEventListener('click', () => { state.region = btn.dataset.region; $('region').value = state.region; render(); }));
      $('results').innerHTML = filtered.length ? filtered.map(card).join('') : '<div class="empty">没有找到匹配项目。可以放宽地域、月份或关键词再试。</div>';
    }
    function init() {
      initGate();
      fillSelect('region', uniq(records.map(r => r.region)), '全部地域');
      fillSelect('prefecture', uniq(records.map(r => r.prefecture)), '全部都道府县');
      fillSelect('admissionMonth', uniq(records.map(r => r.admissionMonth)), '全部入学月份');
      fillSelect('applicationMonth', uniq(records.flatMap(r => r.applicationMonths)), '全部出愿月份');
      fillSelect('category', uniq(records.map(r => r.category)), '全部类别');
      fillSelect('examType', uniq(records.map(r => r.examType)), '全部区分');
      fillSelect('direction', uniq(records.flatMap(r => r.directionTags || [])), '全部方向');
      const quickMonths = uniq(records.flatMap(r => r.applicationMonths)).slice(0, 8);
      $('quickChips').innerHTML = quickMonths.map(m => `<button class="chip" data-month="${m}">${monthLabel(m)}</button>`).join('');
      $('quickChips').querySelectorAll('[data-month]').forEach(btn => btn.addEventListener('click', () => { state.search = monthLabel(btn.dataset.month); $('search').value = state.search; render(); }));
      $('search').addEventListener('input', e => { state.search = e.target.value; render(); });
      $('schoolSearch').addEventListener('input', e => { state.schoolSearch = e.target.value; render(); });
      fields.forEach(id => $(id).addEventListener('change', e => { state[id] = e.target.value; render(); }));
      $('resetButton').addEventListener('click', () => {
        state.search = '';
        state.schoolSearch = '';
        fields.forEach(id => state[id] = '');
        $('search').value = '';
        $('schoolSearch').value = '';
        fields.forEach(id => $(id).value = '');
        render();
      });
      $('exportButton').addEventListener('click', exportCsv);
      render();
    }
    function initGate() {
      const gate = $('gate');
      const saved = localStorage.getItem('graduateSchoolAccess') === ACCESS_CODE;
      if (saved) gate.classList.add('hidden');
      $('gateForm').addEventListener('submit', event => {
        event.preventDefault();
        const input = $('accessCode').value.trim();
        if (input === ACCESS_CODE) {
          localStorage.setItem('graduateSchoolAccess', ACCESS_CODE);
          gate.classList.add('hidden');
          $('search').focus();
          return;
        }
        $('gateError').textContent = '密码不正确，请重新输入。';
        $('accessCode').select();
      });
    }
    function exportCsv() {
      const filtered = records.filter(matches);
      const headers = ['学校','研究科','専攻・コース','方向','推荐教授','地域','都道府县','入学月份','入试区分','出愿开始','出愿截止','考试形式','链接'];
      const rows = filtered.map(r => [r.school,r.graduateSchool,r.course,r.direction,r.recommendedProfessor,r.region,r.prefecture,r.admissionMonth,r.examType,r.applicationStart,r.applicationEnd,r.examFormat,r.url]);
      const csv = [headers, ...rows].map(row => row.map(cell => `"${String(cell || '').replace(/"/g, '""')}"`).join(',')).join('\n');
      const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = '可考大学院检索结果.csv'; a.click();
      URL.revokeObjectURL(url);
    }
    init();
  </script>
</body>
</html>
